/* ══════════════════════════════════════════════════════════════
   LOGIC
══════════════════════════════════════════════════════════════ */
document.getElementById("total-count").textContent = D.length;

const THEME_FILTERS = { ia:1, sim:1, mix:1 };

function visible(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  return D.filter(d=>{
    let catOk;
    if(cat==="all") catOk = true;
    else if(THEME_FILTERS[cat]) catOk = (d.theme===cat);   // filtres thème (ia/sim)
    else catOk = (d.cat===cat);                            // filtres tier (groupe/startup/etat)
    const hay = [d.company,d.role,d.loc,d.desc,d.dur,d.tier,d.th,...d.skills].join(" ").toLowerCase();
    return catOk&&(!q||hay.includes(q));
  });
}

function renderCards(items){
  const g = document.getElementById("grid");
  if(!items.length){
    g.innerHTML=`<div class="empty"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Aucune offre ne correspond à cette recherche.</p></div>`;
    return;
  }
  const start=(page-1)*PER, slice=items.slice(start,start+PER);
  g.innerHTML=slice.map(d=>{
    return `<div class="card">
      <div class="card-top">
        <div class="card-title"><div class="company">${d.company}</div><div class="role">${d.role}</div></div>
        <div class="cat-icon">${d.icon}</div>
      </div>
      <div class="tags">
        <span class="tag t-tier">${d.tier}</span>
        <span class="tag ${d.thc}">${d.th}</span>
        <span class="tag t-loc">📍 ${d.loc}</span>
        <span class="tag t-dur">⏱ ${d.dur}</span>
      </div>
      <div class="desc">${d.desc}</div>
      <div class="skills">${d.skills.map(s=>`<span class="skill">${s}</span>`).join("")}</div>
      <div class="card-foot">
        <div class="date-label">🗓 ${d.date}</div>
        <a href="${d.url}" target="_blank" rel="noopener" class="btn-apply">Voir l'offre ↗</a>
      </div>
    </div>`;
  }).join("");
}

function renderPag(total){
  const pages=Math.ceil(total/PER), pag=document.getElementById("pag");
  if(pages<=1){pag.innerHTML="";return;}
  let h=`<button class="pgb" onclick="go(${page-1})" ${page===1?"disabled":""}>‹</button>`;
  const r=[];
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1) r.push(i);
    else if(r[r.length-1]!=="…") r.push("…");
  }
  r.forEach(p=>{
    if(p==="…") h+=`<span class="pg-dots">…</span>`;
    else h+=`<button class="pgb${p===page?" active":""}" onclick="go(${p})">${p}</button>`;
  });
  h+=`<button class="pgb" onclick="go(${page+1})" ${page===pages?"disabled":""}>›</button>`;
  pag.innerHTML=h;
}

function renderCount(total){
  const s=(page-1)*PER+1, e=Math.min(page*PER,total);
  document.getElementById("tcount").innerHTML=total?`<b>${s}–${e}</b> / <b>${total}</b>`:`<b>0</b> offre`;
}

function refresh(){
  page=1;
  const v=visible();
  renderCards(v); renderPag(v.length); renderCount(v.length);
  window.scrollTo({top:0,behavior:"smooth"});
}

function go(p){
  const v=visible(), pages=Math.ceil(v.length/PER);
  if(p<1||p>pages) return;
  page=p;
  renderCards(v); renderPag(v.length); renderCount(v.length);
  document.querySelector(".grid-wrap").scrollIntoView({behavior:"smooth"});
}

function setF(btn){
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on"); cat=btn.dataset.f; refresh();
}

refresh();
</script>
